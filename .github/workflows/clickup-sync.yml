name: ClickUp PR Sync

on:
  workflow_call:
    inputs:
      status_in_review:
        description: "ClickUp status to set when a PR is opened"
        type: string
        default: "in review"
      status_complete:
        description: "ClickUp status to set when a PR is merged"
        type: string
        default: "complete"
      status_qa:
        description: "If set, merged PRs move here instead of status_complete"
        type: string
        default: ""
      severity_field_id:
        description: "ClickUp custom field ID for severity labels (leave empty to skip)"
        type: string
        default: ""
      branch_prefixes:
        description: "Comma-separated branch prefixes to scan for ticket IDs"
        type: string
        default: "CU-,RB-"
    secrets:
      CLICKUP_API_TOKEN:
        required: true

# PR linking is handled by ClickUp's native GitHub integration (rich cards).
# This workflow only handles status transitions and custom field updates.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Parse branch for ticket ID
        id: parse
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          PREFIXES="${{ inputs.branch_prefixes }}"

          TICKET_ID=""
          IFS=',' read -ra PREFIX_ARRAY <<< "$PREFIXES"
          for prefix in "${PREFIX_ARRAY[@]}"; do
            prefix=$(echo "$prefix" | xargs)
            if [[ "$BRANCH" =~ ^${prefix}([a-zA-Z0-9]+) ]]; then
              TICKET_ID="${BASH_REMATCH[1]}"
              break
            fi
          done

          if [ -z "$TICKET_ID" ]; then
            echo "::notice::Branch '$BRANCH' has no ticket prefix ($PREFIXES). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "ticket_id=$TICKET_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate ticket exists
        if: steps.parse.outputs.skip != 'true'
        id: validate
        run: |
          TICKET_ID="${{ steps.parse.outputs.ticket_id }}"
          HTTP_CODE=$(curl -s -o /tmp/task.json -w "%{http_code}" \
            -H "Authorization: ${{ secrets.CLICKUP_API_TOKEN }}" \
            "https://api.clickup.com/api/v2/task/$TICKET_ID")

          if [ "$HTTP_CODE" = "401" ]; then
            echo "::warning::ClickUp auth failed (401). Check CLICKUP_API_TOKEN secret."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::warning::ClickUp task $TICKET_ID not found (404). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::ClickUp API returned $HTTP_CODE. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            TASK_NAME=$(jq -r '.name // "unknown"' /tmp/task.json)
            echo "::notice::Syncing with ClickUp task: $TASK_NAME ($TICKET_ID)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: PR opened — move to "in review"
        if: |
          steps.parse.outputs.skip != 'true' &&
          steps.validate.outputs.skip != 'true' &&
          (github.event.action == 'opened' || github.event.action == 'ready_for_review')
        continue-on-error: true
        run: |
          curl -sf -X PUT \
            -H "Authorization: ${{ secrets.CLICKUP_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg s "${{ inputs.status_in_review }}" '{status: $s}')" \
            "https://api.clickup.com/api/v2/task/${{ steps.parse.outputs.ticket_id }}" \
            > /dev/null || echo "::warning::Failed to update status to '${{ inputs.status_in_review }}'"

      - name: PR merged — move to "complete"
        if: |
          steps.parse.outputs.skip != 'true' &&
          steps.validate.outputs.skip != 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        continue-on-error: true
        run: |
          QA="${{ inputs.status_qa }}"
          STATUS="${QA:-${{ inputs.status_complete }}}"
          curl -sf -X PUT \
            -H "Authorization: ${{ secrets.CLICKUP_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg s "$STATUS" '{status: $s}')" \
            "https://api.clickup.com/api/v2/task/${{ steps.parse.outputs.ticket_id }}" \
            > /dev/null || echo "::warning::Failed to update status to '$STATUS'"

      - name: Severity label — update custom field
        if: |
          steps.parse.outputs.skip != 'true' &&
          steps.validate.outputs.skip != 'true' &&
          github.event.action == 'labeled' &&
          inputs.severity_field_id != ''
        continue-on-error: true
        run: |
          LABEL="${{ github.event.label.name }}"
          if [[ "$LABEL" =~ ^severity:(.+)$ ]]; then
            curl -sf -X POST \
              -H "Authorization: ${{ secrets.CLICKUP_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg v "${BASH_REMATCH[1]}" '{value: $v}')" \
              "https://api.clickup.com/api/v2/task/${{ steps.parse.outputs.ticket_id }}/field/${{ inputs.severity_field_id }}" \
              > /dev/null || echo "::warning::Failed to update severity field"
          fi
